name: image_tools
channels:
- conda-forge
dependencies:
  - python >= 3.8
  - ipython
  - pyqt
  - pip
  - numpy 
  - scipy
  - opencv
  - scikit-image
  - scikit-learn
  - pyqtgraph
  - pip:
    - git+https://github.com/ElTinmar/qt_widgets.git@v0.5.0
    - git+https://github.com/ElTinmar/geometry.git@v0.3.0
    - pytest
    - pytest-benchmark